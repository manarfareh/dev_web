<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionnaire de Taches Intelligent</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Votre CSS personnalise -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ==================== CONTENU PRINCIPAL ==================== -->
    <div class="container my-4">
      
      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <h5 class="card-title mb-3">
            <i class="bi bi-plus-circle me-2 text-primary"></i>Ajouter une
            nouvelle tache
          </h5>
        </div>
      </div>

      <!-- ==================================================
         BOUTONS DE FILTRE
         Créer 3 boutons pour filtrer la liste :
         - Toutes      (data-filtre="toutes")
         - En cours    (data-filtre="en-cours")
         - Terminées   (data-filtre="terminees")

         Utiliser class="filtre-btn" sur chaque bouton.
         Le bouton actif par défaut doit aussi avoir
         la classe "filtre-actif".
         ================================================== -->
      <div class="d-flex justify-content-center gap-2 mb-4">
        <!-- TODO: Ajouter les trois boutons de filtre ici -->
        <!-- Exemple : <button class="btn btn-outline-primary filtre-btn filtre-actif" data-filtre="toutes">Toutes</button> -->
      </div>

      <!-- ==================================================
         CONTENEUR DE LA LISTE DES TACHES
         C'est ici que JavaScript affichera les cartes.
         ================================================== -->
      <div id="liste-taches" class="row g-3">
        <!-- Les taches seront affichées ici par JavaScript -->
      </div>
    </div>


    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
